<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CyberGraph AI — Submission History</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="topbar">
    <div class="lp-brand">
      <span class="lp-brand-icon">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2 4 5v6c0 5 3.4 8.6 8 10 4.6-1.4 8-5 8-10V5z"/><path d="m9 12 2 2 4-4"/></svg>
      </span>
      <span class="lp-brand-name">CyberGraph AI</span>
    </div>
    <nav>
      <a href="index.html">← Back to survey</a>
    </nav>
  </header>

  <main class="container">
    <h1>Submission History</h1>
    <p class="hint">
      This list is stored in this browser only (via localStorage) — it won't show submissions
      made from other devices or browsers.
    </p>

    <table class="history-table">
      <thead>
        <tr>
          <th>Submitted</th>
          <th>Name</th>
          <th>Company</th>
          <th>Risk Score</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="history-body"></tbody>
    </table>

    <p id="empty-state" class="hint" hidden>No submissions yet.</p>

    <section id="detail-section" class="card" hidden>
      <h2>Submission detail</h2>
      <div id="detail-body"></div>
    </section>
  </main>

  <script src="js/scoring.js"></script>
  <script src="js/csv.js"></script>
  <script src="js/history.js"></script>
</body>
</html>
